<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>LearnAnything</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e2e; color: #cdd6f4; }
    #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #1e1e2e; border-bottom: 1px solid #313244; gap: 12px; }
    .toolbar-group { display: flex; gap: 8px; align-items: center; }
    .search-box { flex: 1; max-width: 300px; }
    .search-input { width: 100%; padding: 6px 12px; border: 1px solid #313244; border-radius: 4px; background: #313244; color: #cdd6f4; }
    .stats { color: #cdd6f4; font-size: 12px; gap: 16px; }
    .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .btn-sm { padding: 4px 8px; }
    .btn-primary { background: #3b82f6; color: white; }
    .graph-wrapper { flex: 1; position: relative; overflow: hidden; }
    .graph-container { width: 100%; height: 100%; background: #1e1e2e; }
    .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(30,30,46,0.9); z-index: 10; }
    .loading-spinner { font-size: 48px; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .detail-panel { position: fixed; right: 20px; top: 80px; width: 300px; background: #1e1e2e; border: 1px solid #313244; border-radius: 8px; padding: 16px; z-index: 100; }
    .close-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #cdd6f4; cursor: pointer; font-size: 16px; }
    .node-type { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #3b82f6; color: white; font-size: 12px; margin-right: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <div class="toolbar-group">
        <button class="btn btn-sm btn-primary" @click="loadData">🔄 加载数据</button>
        <button class="btn btn-sm" @click="fitGraph">⬜ 适应</button>
      </div>
      <div class="toolbar-group search-box">
        <input v-model="searchQuery" @input="onSearch" placeholder="🔍 搜索节点..." class="search-input">
      </div>
      <div class="toolbar-group stats">
        <span>节点: {{ nodeCount }}</span>
        <span>边: {{ edgeCount }}</span>
      </div>
    </div>

    <div class="graph-wrapper">
      <div v-if="loading" class="loading-overlay">
        <div class="loading-spinner">⏳</div>
        <div>加载图谱...</div>
      </div>
      <div class="graph-container" ref="graphContainer"></div>
    </div>

    <div class="detail-panel" v-if="selectedNode">
      <button class="close-btn" @click="selectedNode = null">✕</button>
      <h3>{{ selectedNode.name }}</h3>
      <div><span class="node-type">{{ selectedNode.type }}</span></div>
      <div style="margin-top: 12px; font-size: 13px; line-height: 1.5;">{{ selectedNode.description }}</div>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;
    
    cytoscape.use(cytoscapeDagre);

    createApp({
      setup() {
        const graphContainer = ref(null);
        const loading = ref(false);
        const nodeCount = ref(0);
        const edgeCount = ref(0);
        const searchQuery = ref('');
        const selectedNode = ref(null);
        let cy = null;
        let searchTimer = null;

        onMounted(() => {
          initCy();
          loadData();
        });

        function initCy() {
          if (!graphContainer.value) return;
          cy = cytoscape({
            container: graphContainer.value,
            style: [
              { selector: 'node', style: {
                'label': 'data(cardLabel)', 'text-wrap': 'wrap', 'text-max-width': '110px',
                'text-valign': 'center', 'text-halign': 'center', 'font-size': '12px',
                'color': '#fff', 'text-outline-color': 'rgba(0,0,0,0.6)', 'text-outline-width': 2,
                'width': 160, 'height': 'data(cardHeight)', 'padding': '18px',
                'border-width': 2, 'border-color': 'rgba(255,255,255,0.5)',
                'shape': 'round-rectangle', 'corner-radius': 8
              }},
              { selector: 'node[type="requirement"]', style: { 'background-color': '#3b82f6' }},
              { selector: 'node[type="sub_requirement"]', style: { 'background-color': '#60a5fa' }},
              { selector: 'node[type="technology"]', style: { 'background-color': '#10b981' }},
              { selector: 'node[type="sub_technology"]', style: { 'background-color': '#6ee7b7' }},
              { selector: 'node[type="concept"]', style: { 'background-color': '#8b5cf6' }},
              { selector: 'edge', style: {
                'width': 2, 'target-arrow-shape': 'triangle', 'arrow-scale': 1.2, 'curve-style': 'straight'
              }},
              { selector: 'edge[type="SOLUTION"]', style: { 'line-color': '#ef4444', 'target-arrow-color': '#ef4444' }},
              { selector: 'edge[type="DEPENDS_ON"]', style: { 'line-color': '#3b82f6', 'target-arrow-color': '#3b82f6', 'line-style': 'dashed' }},
              { selector: 'node[isCopy = "1"]', style: { 'border-style': 'dashed', 'border-color': '#ff9f43', 'border-width': 3 }},
              { selector: 'edge[isCopyEdge = "1"]', style: { 'line-style': 'dashed', 'line-color': '#ff9f43', 'target-arrow-color': '#ff9f43' }}
            ],
            minZoom: 0.05, maxZoom: 3, wheelSensitivity: 0.3
          });

          cy.on('tap', 'node', (evt) => {
            const n = evt.target;
            selectedNode.value = { name: n.data('label'), type: n.data('type'), description: n.data('description') };
          });
          cy.on('tap', (evt) => { if (evt.target === cy) selectedNode.value = null; });
        }

        async function loadData() {
          if (!cy) return;
          cy.elements().remove();
          loading.value = true;

          try {
            const [conceptResp, edgeResp] = await Promise.all([
              fetch('/api/knowledge-graph/generic/concepts?limit=2000'),
              fetch('/api/knowledge-graph/generic/concept-links?limit=2000')
            ]);

            const conceptData = conceptResp.ok ? await conceptResp.json() : { concepts: [] };
            const edgeData = edgeResp.ok ? await edgeResp.json() : { edges: [] };

            console.log('Concepts:', conceptData.count, 'Edges:', edgeData.count);

            const nodes = (conceptData.concepts || []).map(c => {
              const { cardLabel, cardHeight } = buildCardLabel(c.name || '', c.type || 'concept', c.description || '');
              return { data: { id: c.id, label: c.name, cardLabel, cardHeight, type: c.type || 'concept', description: c.description || '' } };
            });

            const edges = (edgeData.edges || []).map(e => ({
              data: { id: `${e.source}-${e.type}-${e.target}`, source: e.source, target: e.target, type: e.type }
            }));

            if (nodes.length > 0) {
              cy.add(nodes);
              nodeCount.value = cy.nodes().length;
            }
            if (edges.length > 0) {
              cy.add(edges);
              edgeCount.value = cy.edges().length;
            }

            if (nodes.length > 0) runLayout();
          } catch (err) {
            console.error('加载失败:', err);
          } finally {
            loading.value = false;
          }
        }

        function runLayout() {
          const nodes = cy.nodes();
          const edges = cy.edges().filter(e => e.style('display') !== 'none');
          if (nodes.length === 0) return;

          const all = nodes.union(edges);
          all.layout({ name: 'dagre', rankDir: 'LR', rankSep: 250, nodeSep: 80, edgeSep: 20, padding: 20, fit: false, animate: false }).run();

          const bbox = all.boundingBox();
          const container = cy.container();
          const zoom = Math.min(container.clientWidth / bbox.w, container.clientHeight / bbox.h, 0.5);
          cy.zoom(Math.max(Math.min(zoom, 0.5), 0.15));
          cy.center(all);
          console.log('布局完成:', nodes.length, '节点,', edges.length, '边');
        }

        function buildCardLabel(name, type, description) {
          const typeLabel = type === 'requirement' ? '需求' : type === 'sub_requirement' ? '子需求' : type === 'technology' ? '技术' : type === 'sub_technology' ? '子技术' : '概念';
          const title = name.substring(0, 12);
          const desc = (description || '').substring(0, 60);
          const descLines = [];
          for (let i = 0; i < desc.length; i += 15) descLines.push(desc.substring(i, i + 15));
          const descText = descLines.join('\n');
          const cardLabel = `${title}\n━━━━━━\n${typeLabel}\n━━━━━━\n${descText}`;
          const descLineCount = Math.max(descLines.length, 1);
          const cardHeight = Math.max(80, 5 * 16 + (descLineCount - 1) * 16 + 36);
          return { cardLabel, cardHeight };
        }

        function fitGraph() { if (cy) cy.fit(); }

        function onSearch() {
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(() => {
            if (!cy) return;
            const query = searchQuery.value.toLowerCase();
            if (!query) { cy.nodes().style('opacity', 1); cy.edges().style('opacity', 1); return; }
            cy.nodes().forEach(n => {
              const label = (n.data('label') || '').toLowerCase();
              const desc = (n.data('description') || '').toLowerCase();
              n.style('opacity', label.includes(query) || desc.includes(query) ? 1 : 0.2);
            });
            cy.edges().style('opacity', 0.1);
          }, 300);
        }

        return { graphContainer, loading, nodeCount, edgeCount, searchQuery, selectedNode, loadData, fitGraph, onSearch };
      }
    }).mount('#app');
  </script>
</body>
</html>
